name: Daily VBI Update

on:
  schedule:
    - cron: '0 * * * *'  
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests numpy

      - name: Scrape today's games
        run: python scraper.py

      - name: Run ratings
        run: python rate.py

      - name: Upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python upload.py

      - name: Commit updated data files
        run: |
          git config user.name "VBI Bot"
          git config user.email "vbi@noreply.github.com"
          git add games.json rankings.json team_conferences.json
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d')"
          git push
